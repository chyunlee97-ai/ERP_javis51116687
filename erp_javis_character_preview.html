
<style>
  body { background: #1a1a1a; margin: 0; }
  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 32px 16px;
    background: #111;
    border-radius: 16px;
    min-height: 520px;
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .ctrl-btn {
    background: #1e1e1e;
    border: 1px solid #333;
    color: #aaa;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .ctrl-btn.active { border-color: #e53; color: #ff6655; background: #2a1510; }
  .ctrl-btn:hover { background: #252525; }

  .widget-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .char-img {
    width: 200px;
    height: 200px;
    object-fit: contain;
    border-radius: 50%;
    position: relative;
    z-index: 2;
  }

  /* 회전 링 */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(220, 40, 20, 0.5);
    z-index: 1;
  }
  .ring1 { width: 215px; height: 215px; animation: spin1 6s linear infinite; }
  .ring2 { width: 230px; height: 230px; border-style: dashed; border-color: rgba(200,30,10,0.3); animation: spin2 9s linear infinite reverse; }
  .ring3 { width: 245px; height: 245px; border-color: rgba(180,20,5,0.2); animation: spin1 14s linear infinite; }

  /* 스캔 라인 */
  .scan-line {
    position: absolute;
    width: 215px;
    height: 215px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 3;
    pointer-events: none;
  }
  .scan-beam {
    position: absolute;
    top: 50%; left: 50%;
    width: 107px; height: 2px;
    background: linear-gradient(to right, rgba(255,60,30,0.8), transparent);
    transform-origin: left center;
    animation: scanRotate 3s linear infinite;
    margin-top: -1px;
  }

  /* 펄스 글로우 */
  .pulse-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(220,40,20,0.6);
    animation: pulseOut 2.5s ease-out infinite;
    z-index: 0;
  }
  .pulse-ring:nth-child(2) { animation-delay: 0.8s; }
  .pulse-ring:nth-child(3) { animation-delay: 1.6s; }

  /* 말풍선 */
  .bubble {
    background: #1e1e1e;
    border: 1px solid #e53;
    border-radius: 12px;
    padding: 10px 16px;
    color: #ff9980;
    font-size: 13px;
    line-height: 1.5;
    max-width: 240px;
    text-align: center;
    position: relative;
    animation: fadeInUp 0.4s ease;
  }
  .bubble::before {
    content: '';
    position: absolute;
    top: -8px; left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-bottom-color: #e53;
    border-top: none;
  }

  .state-label {
    font-size: 12px;
    color: #555;
    letter-spacing: 0.05em;
  }

  .state-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #e53;
    margin-right: 6px;
    animation: blink 1.2s ease-in-out infinite;
  }

  .tray-demo {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    color: #888;
  }
  .tray-icon {
    width: 24px; height: 24px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid #e53;
  }

  @keyframes spin1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spin2 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes scanRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes pulseOut {
    0% { width: 200px; height: 200px; opacity: 0.7; }
    100% { width: 300px; height: 300px; opacity: 0; }
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes thinkingBounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  .thinking .char-img { animation: thinkingBounce 0.8s ease-in-out infinite; }

  .dots span {
    display: inline-block;
    animation: dotPop 1.2s ease-in-out infinite;
    font-size: 18px;
    color: #e53;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPop { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-4px); } }
</style>

<div class="scene" id="scene">
  <h2 class="sr-only">ERP Jarvis 캐릭터 위젯 애니메이션 미리보기</h2>

  <div class="controls">
    <button class="ctrl-btn active" onclick="setState('idle')">대기 (Idle)</button>
    <button class="ctrl-btn" onclick="setState('thinking')">생각중 (Thinking)</button>
    <button class="ctrl-btn" onclick="setState('talking')">응답 (Talking)</button>
  </div>

  <div class="widget-wrap" id="widgetWrap">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="scan-line" id="scanLine">
      <div class="scan-beam"></div>
    </div>
    <img class="char-img" id="charImg" src="/mnt/user-data/uploads/ERP_javis.jpeg" alt="ERP Jarvis 캐릭터">
  </div>

  <div class="bubble" id="bubble" style="display:none"></div>

  <div class="state-label" id="stateLabel">
    <span class="state-dot"></span>IDLE — 대기 중
  </div>

  <div class="tray-demo">
    <img class="tray-icon" src="/mnt/user-data/uploads/ERP_javis.jpeg" alt="트레이 아이콘">
    <span>ERP Jarvis · 작업 표시줄 트레이 상주</span>
  </div>
</div>

<script>
const wrap = document.getElementById('widgetWrap');
const bubble = document.getElementById('bubble');
const scanLine = document.getElementById('scanLine');
const stateLabel = document.getElementById('stateLabel');

const states = {
  idle: {
    label: 'IDLE — 대기 중',
    bubble: null,
    scan: true,
    pulse: true,
  },
  thinking: {
    label: 'THINKING — 조회 중...',
    bubble: '<span class="dots"><span>·</span><span>·</span><span>·</span></span> DB 조회 중',
    scan: true,
    pulse: false,
    bounce: true,
  },
  talking: {
    label: 'TALKING — 응답 완료',
    bubble: '에이스 거래처 3건 찾았어요!<br><small style="color:#888">ACE전자 · 에이스물산 · 에이스유통</small>',
    scan: false,
    pulse: true,
  }
};

function setState(name) {
  document.querySelectorAll('.ctrl-btn').forEach((b, i) => {
    b.classList.toggle('active', ['idle','thinking','talking'][i] === name);
  });

  const s = states[name];

  stateLabel.innerHTML = `<span class="state-dot"></span>${s.label}`;

  if (s.bubble) {
    bubble.innerHTML = s.bubble;
    bubble.style.display = 'block';
    bubble.style.animation = 'none';
    void bubble.offsetWidth;
    bubble.style.animation = 'fadeInUp 0.4s ease';
  } else {
    bubble.style.display = 'none';
  }

  scanLine.style.display = s.scan ? 'block' : 'none';

  document.querySelectorAll('.pulse-ring').forEach(r => {
    r.style.animationPlayState = s.pulse ? 'running' : 'paused';
    if (!s.pulse) r.style.opacity = '0';
    else r.style.opacity = '';
  });

  if (s.bounce) {
    wrap.classList.add('thinking');
  } else {
    wrap.classList.remove('thinking');
  }
}

setState('idle');
</script>
